query SearchFacilitySectionsByBookingStatus($isBooked: Boolean!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  facilitySections(where: { isBooked: { eq: $isBooked } }) {
    id
    facilityId
    name
    sport
    description
    isBooked
    createdAt
  }
}

# ============================================

# Reference

# Common @auth levels:
# - PUBLIC: No authentication required
# - USER: User must be authenticated  
# - ADMIN: User must have admin role
#
# Common operations:
# - table_insert(data: { ... }) - Insert new row
# - table_update(data: { ... }, where: { ... }) - Update rows
# - table_delete(where: { ... }) - Delete rows
# - table(where: { ... }, orderBy: [...], limit: N) - Query rows
